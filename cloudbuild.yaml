steps:
 - name: 'gcr.io/cloud-builders/docker'
   args: ['build','-t','asia-south1-docker.pkg.dev/gcp-demo-492516/sample-repo/pyappimg:latest','.']

 - name: 'gcr.io/cloud-builders/docker'
   args: ['push','asia-south1-docker.pkg.dev/gcp-demo-492516/sample-repo/pyappimg:latest']

 - name: 'gcr.io/cloud-builders/gcloud'
   entrypoint: gcloud
   args:
   - 'run'
   - 'deploy'
   - 'python-app'
   - '-- image'
   - 'asia-south1-docker.pkg.dev/gcp-demo-492516/sample-repo/pyappimg:latest'
   - '-- region'
   - 'asia-south1'
   - '-- allow-unauthenticated'


options:
 logging: CLOUD_LOGGING_ONLY
